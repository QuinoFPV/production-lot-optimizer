<body>

<div class="header">
  <div class="container">
    <h1><span style="font-size:26px">&#9881;&#65039;</span> Production Lot Optimizer</h1>
    <p>Ottimizzazione lotti di produzione &mdash; Prodotti medicali incontinenza</p>
  </div>
</div>

<div class="container">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="setup">&#9881;&#65039; Setup Dati</button>
    <button class="tab" data-tab="optimize">&#128640; Ottimizzazione</button>

  </div>

  <div class="content" id="app-content"></div>
</div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
// ============================================================
// STATE
// ============================================================
const STATE = {
  lines: [
    { id:"L1", name:"Linea Pannoloni", speedPcsMin:450, oee:0.82, plannedHoursDay:16, daysWeek:5, scrapRate:0.025 },
    { id:"L2", name:"Linea Mutandine", speedPcsMin:320, oee:0.78, plannedHoursDay:16, daysWeek:5, scrapRate:0.030 },
    { id:"L3", name:"Linea Traverse/Inserti", speedPcsMin:550, oee:0.85, plannedHoursDay:16, daysWeek:5, scrapRate:0.020 },
  ],
  products: [
    { id:"PAN-S-D", name:"Pannolone Giorno S", line:"L1", logic:"MTS", family:"PAN-D", demandMonth:65000, ssTarget:14, unitCost:0.32, holdingRate:0.22, changeoverMin:45, changeoverCost:280, priority:2 },
    { id:"PAN-M-D", name:"Pannolone Giorno M", line:"L1", logic:"MTS", family:"PAN-D", demandMonth:135000, ssTarget:14, unitCost:0.35, holdingRate:0.22, changeoverMin:25, changeoverCost:160, priority:1 },
    { id:"PAN-L-D", name:"Pannolone Giorno L", line:"L1", logic:"MTS", family:"PAN-D", demandMonth:125000, ssTarget:14, unitCost:0.38, holdingRate:0.22, changeoverMin:25, changeoverCost:160, priority:1 },
    { id:"PAN-XL-D", name:"Pannolone Giorno XL", line:"L1", logic:"SS", family:"PAN-D", demandMonth:55000, ssTarget:21, unitCost:0.42, holdingRate:0.22, changeoverMin:45, changeoverCost:280, priority:2 },
    { id:"PAN-M-N", name:"Pannolone Notte M", line:"L1", logic:"MTS", family:"PAN-N", demandMonth:72000, ssTarget:14, unitCost:0.48, holdingRate:0.22, changeoverMin:60, changeoverCost:380, priority:1 },
    { id:"PAN-L-N", name:"Pannolone Notte L", line:"L1", logic:"MTS", family:"PAN-N", demandMonth:68000, ssTarget:14, unitCost:0.52, holdingRate:0.22, changeoverMin:35, changeoverCost:220, priority:1 },
    { id:"MUT-M", name:"Mutandina M", line:"L2", logic:"MTS", family:"MUT", demandMonth:85000, ssTarget:14, unitCost:0.55, holdingRate:0.22, changeoverMin:50, changeoverCost:320, priority:1 },
    { id:"MUT-L", name:"Mutandina L", line:"L2", logic:"MTS", family:"MUT", demandMonth:78000, ssTarget:14, unitCost:0.58, holdingRate:0.22, changeoverMin:30, changeoverCost:200, priority:1 },
    { id:"MUT-XL", name:"Mutandina XL", line:"L2", logic:"SS", family:"MUT", demandMonth:42000, ssTarget:21, unitCost:0.62, holdingRate:0.22, changeoverMin:50, changeoverCost:320, priority:2 },
    { id:"MUT-PROMO", name:"Mutandina Promo Estate", line:"L2", logic:"Promo", family:"MUT", demandMonth:30000, ssTarget:0, unitCost:0.50, holdingRate:0.22, changeoverMin:50, changeoverCost:320, priority:3 },
    { id:"TRV-60", name:"Traversa 60x90", line:"L3", logic:"MTS", family:"TRV", demandMonth:110000, ssTarget:10, unitCost:0.18, holdingRate:0.22, changeoverMin:20, changeoverCost:120, priority:1 },
    { id:"TRV-80", name:"Traversa 80x180", line:"L3", logic:"MTS", family:"TRV", demandMonth:85000, ssTarget:10, unitCost:0.28, holdingRate:0.22, changeoverMin:30, changeoverCost:180, priority:1 },
    { id:"INS-N", name:"Inserto Normal", line:"L3", logic:"MTS", family:"INS", demandMonth:95000, ssTarget:10, unitCost:0.15, holdingRate:0.22, changeoverMin:40, changeoverCost:250, priority:2 },
    { id:"INS-M", name:"Inserto Maxi", line:"L3", logic:"SS", family:"INS", demandMonth:60000, ssTarget:21, unitCost:0.22, holdingRate:0.22, changeoverMin:40, changeoverCost:250, priority:2 },
    { id:"PAN-MTO1", name:"Pannolone Custom RSA", line:"L1", logic:"MTO", family:"CUSTOM", demandMonth:25000, ssTarget:0, unitCost:0.55, holdingRate:0.22, changeoverMin:90, changeoverCost:550, priority:3 },
  ],
  optimized: [],
  sequences: [],
  scenarioMultiplier: 1.0,
  savedScenario: null,
  activeTab: "setup",
  charts: {},
};

// ============================================================
// OPTIMIZATION ENGINE
// ============================================================
function optimizeLots(products, lines) {
  return products.map(p => {
    const line = lines.find(l => l.id === p.line);
    if (!line) return { ...p, optimalLot: 0, error: "Linea non trovata" };
    const effSpeed = line.speedPcsMin * line.oee * (1 - line.scrapRate);
    const capMonth = effSpeed * 60 * line.plannedHoursDay * line.daysWeek * 4.33;
    const demDay = p.demandMonth / (line.daysWeek * 4.33);
    const D = p.demandMonth * 12;
    const S = p.changeoverCost + (p.changeoverMin / 60) * effSpeed * p.unitCost * line.scrapRate;
    const H = p.unitCost * p.holdingRate;
    const prodRate = effSpeed * 60 * line.plannedHoursDay * line.daysWeek * 4.33 * 12;
    const dOverP = Math.min(D / prodRate, 0.95);
    const ebq = Math.round(Math.sqrt((2 * D * S) / (H * (1 - dOverP))));
    const ssQty = Math.round(demDay * p.ssTarget);
    const minLot = p.logic === "MTO" ? Math.round(p.demandMonth) : Math.round(demDay * 3);
    const maxLot = Math.round(p.demandMonth * 2);
    let optLot = Math.max(minLot, Math.min(ebq, maxLot));
    if (p.logic === "Promo") optLot = p.demandMonth;
    else if (p.logic === "MTO") optLot = Math.round(p.demandMonth * 1.02);
    else if (p.logic === "SS") optLot = Math.max(optLot, ssQty);
    const prodTimeHrs = (optLot / effSpeed) / 60;
    const lotsPerMonth = Math.max(1, Math.ceil(p.demandMonth / optLot));
    const totalCOMonth = lotsPerMonth * p.changeoverMin;
    const daysInv = optLot / demDay;
    const avgInv = optLot / 2 + ssQty;
    const avgInvCost = avgInv * p.unitCost;
    const annHolding = avgInvCost * p.holdingRate;
    const annSetup = lotsPerMonth * 12 * p.changeoverCost;
    const scrapPerLot = Math.round(optLot * line.scrapRate / (1 - line.scrapRate));
    const util = (p.demandMonth / capMonth) * 100;
    return {
      ...p, lineName: line.name, effSpeed: Math.round(effSpeed), capMonth: Math.round(capMonth),
      optimalLot: optLot, ebq, prodTimeHrs: Math.round(prodTimeHrs * 10) / 10,
      lotsPerMonth, totalCOMonth, daysInv: Math.round(daysInv), avgInv: Math.round(avgInv),
      avgInvCost: Math.round(avgInvCost), annHolding: Math.round(annHolding), annSetup: Math.round(annSetup),
      totalAnnCost: Math.round(annHolding + annSetup), scrapPerLot, ssQty, util: Math.round(util * 10) / 10,
      demDay: Math.round(demDay),
    };
  });
}

function buildSequences(optimized, lines) {
  return lines.map(line => {
    const lp = optimized.filter(p => p.line === line.id);
    if (!lp.length) return { line, sequence: [], stats: {} };
    const families = [...new Set(lp.map(p => p.family))];
    const sorted = [];
    families.forEach(f => { sorted.push(...lp.filter(p => p.family === f).sort((a, b) => a.priority - b.priority)); });
    const totalDem = lp.reduce((s, p) => s + p.demandMonth, 0);
    const totalCO = lp.reduce((s, p) => s + p.totalCOMonth, 0);
    const totalProdHrs = lp.reduce((s, p) => s + (p.demandMonth / p.effSpeed / 60), 0);
    const availHrs = line.plannedHoursDay * line.daysWeek * 4.33;
    const coHrs = totalCO / 60;
    const netUtil = ((totalProdHrs + coHrs) / availHrs) * 100;
    const prodUtil = (totalProdHrs / availHrs) * 100;
    const coPct = (coHrs / availHrs) * 100;
    const idlePct = Math.max(0, 100 - netUtil);
    return { line, sequence: sorted, stats: { totalDem, totalCO, totalProdHrs: Math.round(totalProdHrs), availHrs: Math.round(availHrs), coHrs: Math.round(coHrs), netUtil: r1(netUtil), prodUtil: r1(prodUtil), coPct: r1(coPct), idlePct: r1(idlePct), count: lp.length } };
  });
}

function runOptimization() {
  const prods = STATE.products.map(p => ({ ...p, demandMonth: Math.round(p.demandMonth * STATE.scenarioMultiplier) }));
  STATE.optimized = optimizeLots(prods, STATE.lines);
  STATE.sequences = buildSequences(STATE.optimized, STATE.lines);
}

// ============================================================
// HELPERS
// ============================================================
const fmt = n => typeof n === "number" ? n.toLocaleString("it-IT") : n;
const fmtK = n => n >= 1e6 ? (n/1e6).toFixed(1)+"M" : n >= 1000 ? (n/1000).toFixed(1)+"K" : fmt(n);
const fmtE = n => "\u20ac" + fmtK(n);
const r1 = n => Math.round(n * 10) / 10;
const $ = id => document.getElementById(id);
const logicBadge = l => `<span class="badge badge-${l.toLowerCase()}">${l}</span>`;
const FCOLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#ec4899","#f97316"];

function destroyChart(key) { if (STATE.charts[key]) { STATE.charts[key].destroy(); delete STATE.charts[key]; } }

// ============================================================
// TAB NAVIGATION
// ============================================================
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    STATE.activeTab = btn.dataset.tab;
    render();
  });
});

// ============================================================
// MODAL
// ============================================================
function showModal(html) {
  $('modal-root').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { $('modal-root').innerHTML = ''; }

// ============================================================
// RENDER
// ============================================================
function render() {
  runOptimization();
  const el = $('app-content');
  switch (STATE.activeTab) {
    case 'setup': renderSetup(el); break;
    case 'optimize': renderOptimize(el); break;
    case 'sequence': renderSequence(el); break;
    case 'analysis': renderAnalysis(el); break;
    case 'whatif': renderWhatIf(el); break;
  }
}

// ============================================================
// SETUP TAB
// ============================================================

      <div class="flex-between">

        <button class="btn btn-pri btn-sm" onclick="showAddLineModal()">+ Aggiungi Linea</button>

function renderLinesTable() {
  const tbody = $('lines-tbody');
  tbody.innerHTML = STATE.lines.map(l => {
    const eff = l.speedPcsMin * l.oee * (1 - l.scrapRate);
    const cap = Math.round(eff * 60 * l.plannedHoursDay * l.daysWeek * 4.33);
    return `<tr>
      <td><strong>${l.id}</strong></td>
      <td>${editableCell(l.id, 'line', 'name', l.name, 'text')}</td>
      <td>${editableCell(l.id, 'line', 'speedPcsMin', l.speedPcsMin, 'number')}</td>
      <td>${editableCell(l.id, 'line', 'oee', (l.oee*100).toFixed(0)+'%', 'oee')}</td>
      <td>${editableCell(l.id, 'line', 'plannedHoursDay', l.plannedHoursDay, 'number')}</td>
      <td>${editableCell(l.id, 'line', 'daysWeek', l.daysWeek, 'number')}</td>
      <td>${editableCell(l.id, 'line', 'scrapRate', (l.scrapRate*100).toFixed(1)+'%', 'pct')}</td>
      <td style="font-weight:700;color:var(--pri)">${fmt(cap)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteLine('${l.id}')" title="Elimina">&times;</button></td>
    </tr>`;
  }).join('');
}

function renderProductsTable() {
  const tbody = $('products-tbody');
  tbody.innerHTML = STATE.products.map(p => {
    const lineName = STATE.lines.find(l => l.id === p.line)?.name || p.line;
    return `<tr>
      <td><strong>${p.id}</strong></td>
      <td>${editableCell(p.id, 'prod', 'name', p.name, 'text')}</td>
      <td>${editableCell(p.id, 'prod', 'line', lineName, 'line-select')}</td>

function editableCell(itemId, type, field, display, inputType) {
  const cellId = `${type}-${itemId}-${field}`;
  return `<span class="editable" id="${cellId}" onclick="startEdit('${cellId}','${itemId}','${type}','${field}','${inputType}')">${inputType==='logic-select' ? logicBadge(display) : display}</span>`;
}

function startEdit(cellId, itemId, type, field, inputType) {
  const cell = $(cellId);
  const item = type === 'line' ? STATE.lines.find(l => l.id === itemId) : STATE.products.find(p => p.id === itemId);
  let val = item[field];
  let html = '';
  if (inputType === 'line-select') {
    html = `<select onchange="saveEdit('${itemId}','${type}','${field}',this.value)" onblur="render()" autofocus>
      ${STATE.lines.map(l => `<option value="${l.id}" ${l.id===val?'selected':''}>${l.name}</option>`).join('')}
    </select>`;
  } else if (inputType === 'logic-select') {
    html = `<select onchange="saveEdit('${itemId}','${type}','${field}',this.value)" onblur="render()" autofocus>
      ${['MTS','MTO','SS','Promo'].map(l => `<option value="${l}" ${l===val?'selected':''}>${l}</option>`).join('')}
    </select>`;
  } else if (inputType === 'oee') {
    html = `<input type="number" step="1" min="0" max="100" value="${Math.round(val*100)}" style="width:60px"
      onblur="saveEdit('${itemId}','${type}','${field}',this.value/100);render()"
      onkeydown="if(event.key==='Enter'){saveEdit('${itemId}','${type}','${field}',this.value/100);render()}" autofocus>%`;
  } else if (inputType === 'pct') {
    html = `<input type="number" step="0.1" min="0" max="100" value="${(val*100).toFixed(1)}" style="width:60px"
      onblur="saveEdit('${itemId}','${type}','${field}',this.value/100);render()"
      onkeydown="if(event.key==='Enter'){saveEdit('${itemId}','${type}','${field}',this.value/100);render()}" autofocus>%`;
  } else if (inputType === 'number-big') {
    html = `<input type="number" step="1000" value="${val}" style="width:100px"
      onblur="saveEdit('${itemId}','${type}','${field}',+this.value);render()"
      onkeydown="if(event.key==='Enter'){saveEdit('${itemId}','${type}','${field}',+this.value);render()}" autofocus>`;
  } else if (inputType === 'number-dec') {
    html = `<input type="number" step="0.01" value="${val}" style="width:70px"
      onblur="saveEdit('${itemId}','${type}','${field}',+this.value);render()"
      onkeydown="if(event.key==='Enter'){saveEdit('${itemId}','${type}','${field}',+this.value);render()}" autofocus>`;
  } else if (inputType === 'number') {
    html = `<input type="number" value="${val}" style="width:70px"
      onblur="saveEdit('${itemId}','${type}','${field}',+this.value);render()"
      onkeydown="if(event.key==='Enter'){saveEdit('${itemId}','${type}','${field}',+this.value);render()}" autofocus>`;
  } else {
    html = `<input type="text" value="${val}" style="width:140px"
      onblur="saveEdit('${itemId}','${type}','${field}',this.value);render()"
      onkeydown="if(event.key==='Enter'){saveEdit('${itemId}','${type}','${field}',this.value);render()}" autofocus>`;
  }
  cell.innerHTML = html;
  cell.querySelector('input,select')?.focus();
}

function saveEdit(itemId, type, field, value) {
  if (type === 'line') {
    const line = STATE.lines.find(l => l.id === itemId);
    if (line) line[field] = value;
  } else {
    const prod = STATE.products.find(p => p.id === itemId);
    if (prod) prod[field] = value;
  }
}

      </label>

      <label style="font-size:13px"><input type="checkbox" id="csv-replace"> Sostituisci tutti gli articoli esistenti</label>
    </div>

      <button class="btn btn-pri" onclick="importCSV()">Importa</button>

    </div>
    <div id="csv-status" style="margin-top:10px"></div>
  `);
}

function loadCSVFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { $('csv-input').value = e.target.result; };
  reader.readAsText(file);
}

function importCSV() {
  const raw = $('csv-input').value.trim();
  if (!raw) return;
  const sep = raw.includes(';') ? ';' : ',';
  const rows = raw.split('\n').map(r => r.trim()).filter(Boolean);
  let startIdx = 0;
  if (rows[0].toLowerCase().includes('id') && rows[0].toLowerCase().includes('name')) startIdx = 1;
  const newProducts = [];
  const errors = [];
  for (let i = startIdx; i < rows.length; i++) {
    const cols = rows[i].split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
    if (cols.length < 12) { errors.push(`Riga ${i+1}: ${cols.length} colonne (servono 12)`); continue; }
    newProducts.push({
      id: cols[0], name: cols[1], line: cols[2], logic: cols[3], family: cols[4],
      demandMonth: +cols[5], ssTarget: +cols[6], unitCost: +cols[7], holdingRate: +cols[8],
      changeoverMin: +cols[9], changeoverCost: +cols[10], priority: +cols[11],
    });
  }
  if ($('csv-replace').checked) STATE.products = newProducts;
  else STATE.products.push(...newProducts);
  const status = $('csv-status');
  status.innerHTML = `<div class="alert alert-ok">Importati ${newProducts.length} articoli.</div>` +
    (errors.length ? `<div class="alert alert-warn">${errors.join('<br>')}</div>` : '');
  setTimeout(() => { closeModal(); render(); }, 1200);
}

function exportCSV() {
  const header = 'id;name;line;logic;family;demandMonth;ssTarget;unitCost;holdingRate;changeoverMin;changeoverCost;priority';
  const rows = STATE.products.map(p => [p.id,p.name,p.line,p.logic,p.family,p.demandMonth,p.ssTarget,p.unitCost,p.holdingRate,p.changeoverMin,p.changeoverCost,p.priority].join(';'));
  const csv = [header, ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'articoli_produzione.csv';
  a.click();
}

    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Costo Holding Annuo</div><div class="kpi-value">${fmtE(totH)}</div></div>
      <div class="kpi"><div class="kpi-label">Costo Setup Annuo</div><div class="kpi-value">${fmtE(totS)}</div></div>
      <div class="kpi"><div class="kpi-label">Scarti Mensili</div><div class="kpi-value">${fmtK(totScrap)}</div><div class="kpi-sub">pezzi</div></div>
      <div class="kpi"><div class="kpi-label">Valore Scorta Media</div><div class="kpi-value">${fmtE(totInvVal)}</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-title">Costi per Logica Gestionale</div><div class="chart-box"><canvas id="chart-logic-cost"></canvas></div></div>
      <div class="card"><div class="card-title">Distribuzione Holding vs Setup</div><div class="chart-box"><canvas id="chart-hs-pie"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-title">Giorni Scorta per Articolo e Logica</div>
      <div class="chart-box" style="height:350px"><canvas id="chart-days-inv"></canvas></div>
    </div>
  `;

  // Cost by logic
  const byLogic = {};
  O.forEach(p => {
    if (!byLogic[p.logic]) byLogic[p.logic] = { holding:0, setup:0 };
    byLogic[p.logic].holding += p.annHolding;
    byLogic[p.logic].setup += p.annSetup;
  });
  const logics = Object.keys(byLogic);
  destroyChart('logicCost');
  STATE.charts.logicCost = new Chart($('chart-logic-cost'), {
    type:'bar', data:{
      labels: logics,
      datasets:[
        { label:'Holding', data: logics.map(l=>byLogic[l].holding), backgroundColor:'#3b82f6' },
        { label:'Setup', data: logics.map(l=>byLogic[l].setup), backgroundColor:'#fbbf24' },
      ]
    }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
  });

  // Pie
  destroyChart('hsPie');
  STATE.charts.hsPie = new Chart($('chart-hs-pie'), {
    type:'doughnut', data:{
      labels:['Holding','Setup'],
      datasets:[{data:[totH,totS], backgroundColor:['#3b82f6','#fbbf24']}]
    }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
  });

  // Days inventory
  const sorted = [...O].sort((a,b)=>a.logic.localeCompare(b.logic));
  const logicColorMap = { MTS:'#3b82f6', MTO:'#f59e0b', SS:'#10b981', Promo:'#ef4444' };
  destroyChart('daysInv');
  STATE.charts.daysInv = new Chart($('chart-days-inv'), {
    type:'bar', data:{
      labels: sorted.map(p=>p.id),
      datasets:[{
        label:'GG Scorta',
        data: sorted.map(p=>p.daysInv),
        backgroundColor: sorted.map(p=>logicColorMap[p.logic]||'#6b7280'),
      }]
    }, options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        annotation:{ annotations:{ line1:{ type:'line', yMin:14, yMax:14, borderColor:'#dc2626', borderWidth:2, borderDash:[5,5] } } }
      }
    }
  });
}

// ============================================================
// WHAT-IF TAB
// ============================================================
function renderWhatIf(el) {
  const O = STATE.optimized;
  const totCost = O.reduce((s,p)=>s+p.totalAnnCost,0);
  const totCO = O.reduce((s,p)=>s+p.totalCOMonth,0);
  const avgDI = O.reduce((s,p)=>s+p.daysInv,0)/O.length;
  const totInv = O.reduce((s,p)=>s+p.avgInvCost,0);
  const m = STATE.scenarioMultiplier;
  const saved = STATE.savedScenario;

  el.innerHTML = `
    <div class="card">
      <div class="card-title">&#128302; Simulatore What-If</div>
      <div class="card-sub">Modifica la domanda globale e osserva l'impatto sui lotti, costi e capacit&agrave;</div>
      <div class="flex-between" style="margin:16px 0">
        <div class="slider-container">
          <label style="font-weight:600;font-size:13px">Moltiplicatore Domanda:</label>
          <input type="range" min="0.5" max="2.0" step="0.05" value="${m}" id="wi-slider"
            oninput="updateScenario(+this.value)">
          <div class="slider-value" id="wi-label" style="color:${m>1?'var(--sec)':m<1?'var(--danger)':'var(--txt)'}">
            ${m===1?'Base':(m>1?'+':'')+((m-1)*100).toFixed(0)+'%'}
          </div>
        </div>
        <div class="flex-row">
          ${[0.7,0.85,1.0,1.15,1.3,1.5].map(v =>
            `<button class="btn ${m===v?'btn-pri':'btn-outline'} btn-sm" onclick="updateScenario(${v})">${v===1?'Base':(v>1?'+':'')+((v-1)*100).toFixed(0)+'%'}</button>`
          ).join('')}
          <button class="btn btn-sec btn-sm" onclick="saveScenario()">Salva Confronto</button>
        </div>
      </div>
      <div class="kpis">
        <div class="kpi"><div class="kpi-label">Costo Totale Annuo</div><div class="kpi-value">${fmtE(totCost)}</div>${saved?`<div class="kpi-sub">Confronto: ${fmtE(saved.totCost)}</div>`:''}</div>
        <div class="kpi"><div class="kpi-label">Changeover/Mese</div><div class="kpi-value">${fmt(totCO)}'</div>${saved?`<div class="kpi-sub">Confronto: ${fmt(saved.totCO)}'</div>`:''}</div>
        <div class="kpi"><div class="kpi-label">GG Scorta Medi</div><div class="kpi-value">${Math.round(avgDI)}</div>${saved?`<div class="kpi-sub">Confronto: ${Math.round(saved.avgDI)}</div>`:''}</div>
        <div class="kpi"><div class="kpi-label">Valore Inventario</div><div class="kpi-value">${fmtE(totInv)}</div>${saved?`<div class="kpi-sub">Confronto: ${fmtE(saved.totInv)}</div>`:''}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Analisi di Sensitivit&agrave;</div>
      <div class="card-sub">Impatto della variazione di domanda su costi e changeover</div>
      <div class="chart-box" style="height:360px"><canvas id="chart-sensitivity"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Impatto sulla Capacit&agrave; per Linea</div>
      ${STATE.sequences.map(seq => {
        const st = seq.stats;
        return `<div style="margin-bottom:16px;padding:14px;border:1px solid var(--grayL);border-radius:10px">
          <div class="flex-between" style="margin-bottom:6px">
            <strong>${seq.line.name}</strong>
            <span style="font-weight:600;color:${st.netUtil>90?'var(--danger)':st.netUtil>75?'var(--warn)':'var(--sec)'}">${st.netUtil}%</span>
          </div>
          <div class="utilization-bar">
            <div class="util-prod" style="width:${st.prodUtil}%;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;font-weight:600">${st.prodUtil>10?'Prod '+st.prodUtil+'%':''}</div>
            <div class="util-co" style="width:${st.coPct}%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600">${st.coPct>5?'C/O '+st.coPct+'%':''}</div>
            <div class="util-idle" style="flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--txtS)">${st.idlePct>5?'Idle '+st.idlePct+'%':''}</div>
          </div>
          ${st.netUtil>95?'<div class="alert alert-danger" style="margin-top:6px;padding:6px 12px;font-size:12px">&#9888; Sovraccarico! Necessario turno aggiuntivo.</div>':
            st.netUtil>85?'<div class="alert alert-warn" style="margin-top:6px;padding:6px 12px;font-size:12px">&#9888; Poco margine per imprevisti.</div>':
            '<div class="alert alert-ok" style="margin-top:6px;padding:6px 12px;font-size:12px">&#9989; Capacit&agrave; OK</div>'}
        </div>`;
      }).join('')}
    </div>
  `;

  // Sensitivity chart
  const scenarios = [0.6,0.7,0.8,0.9,1.0,1.1,1.2,1.3,1.5,1.8,2.0].map(mult => {
    const sp = STATE.products.map(p => ({...p, demandMonth: Math.round(p.demandMonth * mult)}));
    const opt = optimizeLots(sp, STATE.lines);
    return {
      label: `${mult>1?'+':''}${((mult-1)*100).toFixed(0)}%`,
      holding: opt.reduce((s,p)=>s+p.annHolding,0),
      setup: opt.reduce((s,p)=>s+p.annSetup,0),
      total: opt.reduce((s,p)=>s+p.totalAnnCost,0),
      co: opt.reduce((s,p)=>s+p.totalCOMonth,0),
    };
  });
  destroyChart('sensitivity');
  STATE.charts.sensitivity = new Chart($('chart-sensitivity'), {
    type:'bar', data:{
      labels: scenarios.map(s=>s.label),
      datasets:[
        { label:'Holding', data: scenarios.map(s=>s.holding), backgroundColor:'#3b82f640', borderColor:'#3b82f6', borderWidth:1, yAxisID:'y' },
        { label:'Setup', data: scenarios.map(s=>s.setup), backgroundColor:'#fbbf2440', borderColor:'#fbbf24', borderWidth:1, yAxisID:'y' },
        { type:'line', label:'Totale', data: scenarios.map(s=>s.total), borderColor:'#dc2626', borderWidth:2.5, pointRadius:4, fill:false, yAxisID:'y' },
        { type:'line', label:'C/O (min/mese)', data: scenarios.map(s=>s.co), borderColor:'#7c3aed', borderWidth:1.5, borderDash:[5,5], pointRadius:3, fill:false, yAxisID:'y1' },
      ]
    }, options:{
      responsive:true, maintainAspectRatio:false,
      scales:{ y:{stacked:true, position:'left'}, y1:{position:'right', grid:{drawOnChartArea:false}} },
      plugins:{legend:{position:'bottom'}}
    }
  });
}

function updateScenario(val) {
  STATE.scenarioMultiplier = val;
  render();
}

function saveScenario() {
  const O = STATE.optimized;
  STATE.savedScenario = {
    mult: STATE.scenarioMultiplier,
    totCost: O.reduce((s,p)=>s+p.totalAnnCost,0),
    totCO: O.reduce((s,p)=>s+p.totalCOMonth,0),
    avgDI: O.reduce((s,p)=>s+p.daysInv,0)/O.length,
    totInv: O.reduce((s,p)=>s+p.avgInvCost,0),
  };
  render();
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
